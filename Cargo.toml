[workspace]
members = ["crates/paperback-core", "crates/paperback", "crates/pb", "xtask"]
resolver = "2"

[workspace.package]
version = "0.8.5"
edition = "2024"
rust-version = "1.87.0"
license = "MIT"
repository = "https://github.com/trypsynth/paperback"

[workspace.dependencies]
anyhow = "1.0.102"
base64 = "0.22.1"
bitflags = "2.11.1"
cfb = "0.14.0"
ego-tree = "0.11.0"
encoding_rs = "0.8.35"
libchm = "0.1.0"
live-region = "0.1.4"
minisign-verify = "0.2.5"
office-crypto = "0.2.0"
pdfium = { git = "https://github.com/aryanchoudharypro/PDFium-rs", branch = "feature/tagged-pdf-support" }
percent-encoding = "2.3.2"
pulldown-cmark = { version = "0.13.3", default-features = false, features = ["html"] }
regex = "1.12.3"
roman = "0.1"
roxmltree = "0.21.1"
rtf-parser = "0.4.2"
scraper = "0.26.0"
serde = { version = "1.0.228", default-features = false, features = ["derive", "std"] }
sha1 = "0.11.0"
toml = "1.1"
ureq = { version = "3.3.0", default-features = false, features = ["json", "rustls"] }
wxdragon = { version = "0.9.15", features = ["webview"] }
zip = { version = "8.6.0", default-features = false, features = ["deflate"] }
clap = { version = "4", features = ["derive"] }
rstest = "0.26.1"

[patch.crates-io]
wxdragon = { git = "https://github.com/AllenDang/wxDragon" }
