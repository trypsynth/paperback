name: Build Paperback
on:
  push:
    branches:
      - master
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
    - name: Install CMake, Ninja, and Pandoc
      run: |
        choco install cmake ninja pandoc minisign -y
    - name: Install WebView2 SDK
      run: |
        nuget install Microsoft.Web.WebView2 -OutputDirectory packages
        $pkg = Get-ChildItem "packages" -Filter "Microsoft.Web.WebView2.*" -Directory | Select-Object -First 1
        $libPath = Join-Path $pkg.FullName "build\native\x64"
        echo "LIB=$env:LIB;$libPath" >> $env:GITHUB_ENV
    - name: Install Gettext via MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          gettext
          mingw-w64-ucrt-x86_64-gettext-tools
    - name: Clone wxWidgets
      run: git clone --recurse-submodules https://github.com/wxWidgets/wxWidgets.git
    - name: Build
      run: |
        $env:WXWIDGETS_DIR = "${{ github.workspace }}\wxWidgets"
        $env:PATH = "$env:PATH;C:\msys64\ucrt64\bin;C:\msys64\usr\bin"
        cargo release
    - name: Sign artifacts
      shell: pwsh
      env:
        MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
      run: |
        $keyPath = Join-Path $env:RUNNER_TEMP "paperback.key"
        [IO.File]::WriteAllText($keyPath, $env:MINISIGN_KEY)
        $pwPath = Join-Path $env:RUNNER_TEMP "paperback.pw"
        [IO.File]::WriteAllText($pwPath, $env:MINISIGN_PASSWORD)
        Get-Content $pwPath | minisign -S -s $keyPath -m target/release/paperback_setup.exe
        Get-Content $pwPath | minisign -S -s $keyPath -m target/release/paperback.zip
        Remove-Item $keyPath, $pwPath
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: paperback-windows
        path: |
          target/release/paperback.zip
          target/release/paperback.zip.minisig
          target/release/paperback_setup.exe
          target/release/paperback_setup.exe.minisig
        retention-days: 30

  build-linux-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Generate cargo sources for Flatpak
      run: |
        pip install aiohttp tomlkit
        curl -sSL https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py -o flatpak-cargo-generator.py
        python3 flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json
    - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: paperback.flatpak
        manifest-path: dev.paperback.desktop.yaml
        cache-key: flatpak-builder-${{ hashFiles('dev.paperback.desktop.yaml', 'Cargo.lock') }}
        restore-keys: flatpak-builder-

  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Set ANDROID_NDK_HOME
      run: echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
    - name: Install Rust with Android targets
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-linux-android,armv7-linux-androideabi
    - name: Install cargo-ndk
      run: cargo install cargo-ndk
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: gradle-
    - name: Set up Android signing keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      run: |
        echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/paperback-release.jks"
        echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/paperback-release.jks" >> $GITHUB_ENV
        echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> $GITHUB_ENV
        echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> $GITHUB_ENV
        echo "ANDROID_STORE_PASSWORD=$ANDROID_STORE_PASSWORD" >> $GITHUB_ENV
    - name: Build Android native libraries, bindings, and APK
      run: |
        chmod +x android/gradlew
        cargo android --release
    - name: Copy APKs
      run: |
        cp android/app/build/outputs/apk/release/app-arm64-v8a-release.apk paperback-android-arm64.apk
        cp android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk paperback-android-arm.apk
    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: paperback-android
        path: |
          paperback-android-arm64.apk
          paperback-android-arm.apk
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Install dependencies
      run: |
        brew install cmake ninja pandoc gettext
        echo "/opt/homebrew/opt/gettext/bin" >> $GITHUB_PATH
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
    - name: Cache wxWidgets source
      id: wxwidgets-cache
      uses: actions/cache@v4
      with:
        path: wxWidgets
        key: wxwidgets-${{ runner.os }}-${{ runner.arch }}-v1
    - name: Clone wxWidgets
      if: steps.wxwidgets-cache.outputs.cache-hit != 'true'
      run: git clone --recurse-submodules https://github.com/wxWidgets/wxWidgets.git
    - name: Build and package
      env:
        WXWIDGETS_DIR: ${{ github.workspace }}/wxWidgets
        MACOSX_DEPLOYMENT_TARGET: "15.0"
      run: cargo release
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: paperback-macos
        path: target/release/paperback-macos.dmg
        retention-days: 30

  release:
    needs: [build-windows, build-linux-flatpak, build-android, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: paperback-windows
        path: windows-build
    - name: Download Linux Flatpak
      uses: actions/download-artifact@v4
      with:
        name: paperback-x86_64.flatpak
        path: linux-build
    - name: Download Android APK
      uses: actions/download-artifact@v4
      with:
        name: paperback-android
        path: android-build
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: paperback-macos
        path: macos-build
    - name: Get latest tag reachable from HEAD
      id: get_tag
      shell: bash
      run: |
        TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        echo "tag=$TAG" >> $GITHUB_OUTPUT
    - name: Generate release notes
      id: release_notes
      shell: bash
      run: |
        PREV_TAG="${{ steps.get_tag.outputs.tag }}"
        if [ -z "$PREV_TAG" ]; then
          COMMITS=$(git log -1 --pretty=format:"- %h: %s" HEAD)
        else
          COMMITS=$(git log --pretty=format:"- %h: %s" "$PREV_TAG"..HEAD)
        fi
        COMMITS="${COMMITS//'%'/'%25'}"
        echo "commits<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    - name: Create or update latest release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Development Build
        body: |
          ## Commits since last release
          ${{ steps.release_notes.outputs.commits }}
        files: |
          windows-build/paperback.zip
          windows-build/paperback.zip.minisig
          windows-build/paperback_setup.exe
          windows-build/paperback_setup.exe.minisig
          linux-build/paperback.flatpak
          android-build/paperback-android-arm64.apk
          android-build/paperback-android-arm.apk
          macos-build/paperback-macos.dmg
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
