name: Build Paperback
on:
  push:
    branches:
      - master
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
    - name: Install CMake, Ninja, and Pandoc
      run: |
        choco install cmake ninja pandoc minisign -y
    - name: Install WebView2 SDK
      run: |
        nuget install Microsoft.Web.WebView2 -OutputDirectory packages
        $pkg = Get-ChildItem "packages" -Filter "Microsoft.Web.WebView2.*" -Directory | Select-Object -First 1
        $libPath = Join-Path $pkg.FullName "build\native\x64"
        echo "LIB=$env:LIB;$libPath" >> $env:GITHUB_ENV
    - name: Install Gettext via MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          gettext
          mingw-w64-ucrt-x86_64-gettext-tools
    - name: Clone wxWidgets
      run: git clone --recurse-submodules https://github.com/wxWidgets/wxWidgets.git
    - name: Build
      run: |
        $env:WXWIDGETS_DIR = "${{ github.workspace }}\wxWidgets"
        $env:PATH = "$env:PATH;C:\msys64\ucrt64\bin;C:\msys64\usr\bin"
        cargo release
    - name: Sign artifacts
      shell: pwsh
      env:
        MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
      run: |
        $keyPath = Join-Path $env:RUNNER_TEMP "paperback.key"
        [IO.File]::WriteAllText($keyPath, $env:MINISIGN_KEY)
        Write-Output $env:MINISIGN_PASSWORD | minisign -S -s $keyPath -m target/release/paperback_setup.exe
        Write-Output $env:MINISIGN_PASSWORD | minisign -S -s $keyPath -m target/release/paperback.zip
        Remove-Item $keyPath
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: paperback-windows
        path: |
          target/release/paperback.zip
          target/release/paperback.zip.minisig
          target/release/paperback_setup.exe
          target/release/paperback_setup.exe.minisig
        retention-days: 30

  build-linux-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Generate cargo sources for Flatpak
      run: |
        pip install aiohttp tomlkit
        curl -sSL https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py -o flatpak-cargo-generator.py
        python3 flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json
    - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: paperback.flatpak
        manifest-path: io.github.trypsynth.Paperback.yaml
        cache-key: flatpak-builder-${{ github.sha }}

  release:
    needs: [build-windows, build-linux-flatpak]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: paperback-windows
        path: windows-build
    - name: Download Linux Flatpak
      uses: actions/download-artifact@v4
      with:
        name: paperback-x86_64.flatpak
        path: linux-build
    - name: Get latest tag reachable from HEAD
      id: get_tag
      shell: bash
      run: |
        TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        echo "tag=$TAG" >> $GITHUB_OUTPUT
    - name: Generate release notes
      id: release_notes
      shell: bash
      run: |
        PREV_TAG="${{ steps.get_tag.outputs.tag }}"
        if [ -z "$PREV_TAG" ]; then
          COMMITS=$(git log -1 --pretty=format:"- %h: %s" HEAD)
        else
          COMMITS=$(git log --pretty=format:"- %h: %s" "$PREV_TAG"..HEAD)
        fi
        COMMITS="${COMMITS//'%'/'%25'}"
        echo "commits<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    - name: Create or update latest release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Development Build
        body: |
          ## Commits since last release
          ${{ steps.release_notes.outputs.commits }}
        files: |
          windows-build/paperback.zip
          windows-build/paperback.zip.minisig
          windows-build/paperback_setup.exe
          windows-build/paperback_setup.exe.minigig
          linux-build/paperback.flatpak
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}